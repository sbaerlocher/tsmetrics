schemaVersion: "2.0.0"

commandTests:
    # TSMetrics Binary Tests
    - name: "Check tsmetrics help command"
      command: "/tsmetrics"
      args: ["--help"]
      expectedOutput:
          - "TSMetrics - Tailscale device metrics collector"
          - "Usage: tsmetrics"

    - name: "Check tsmetrics version command"
      command: "/tsmetrics"
      args: ["--version"]
      expectedOutput:
          - "tsmetrics"

    # User and UID Tests
    - name: "Check if container is running as user '65534'"
      command: "id"
      args: ["-u"]
      expectedOutput:
          - "65534"

    - name: "Check if group is '65534'"
      command: "id"
      args: ["-g"]
      expectedOutput:
          - "65534"

    # Basic System Tests
    - name: "Check if /tsmetrics is executable"
      command: "test"
      args: ["-x", "/tsmetrics"]

    # SSL Certificate Test
    - name: "Check SSL certificates exist"
      command: "test"
      args: ["-f", "/etc/ssl/certs/ca-certificates.crt"]

fileExistenceTests:
    - name: "Check TSMetrics Binary"
      path: "/tsmetrics"
      shouldExist: true
      permissions: "-rwxr-xr-x"

    - name: "Check CA Certificates"
      path: "/etc/ssl/certs/ca-certificates.crt"
      shouldExist: true

    - name: "Check Root Directory is Minimal"
      path: "/root"
      shouldExist: false

    - name: "Check No Shell Available"
      path: "/bin/sh"
      shouldExist: false

    - name: "Check No Package Manager"
      path: "/usr/bin/apk"
      shouldExist: false

fileContentTests:
    - name: "Check binary file type"
      path: "/tsmetrics"
      expectedContents:
          - ".*ELF.*"

metadataTest:
    labels:
        - key: "org.opencontainers.image.title"
          value: "tsmetrics"
        - key: "org.opencontainers.image.description"
          value: "Prometheus exporter for Tailscale metrics and device information"
    exposedPorts: ["9100"]
    user: "65534:65534"
    cmd: ["/tsmetrics"]
