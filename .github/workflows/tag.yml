---
name: Tag Release
run-name: |
  Release ${{ github.ref_name }} by @${{ github.actor }}

'on':
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tsnet-version: ${{ steps.build-versions.outputs.tsnet_version }}
      version-long: ${{ steps.build-versions.outputs.version_long }}
      version-short: ${{ steps.build-versions.outputs.version_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $REF_NAME"

      - name: Calculate build versions
        id: build-versions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Get Tailscale version from go.mod
          TSNET_VERSION=$(go list -m -f '{{.Version}}' tailscale.com 2>/dev/null | sed 's/^v//' || echo "unknown")
          VERSION_CLEAN=$(echo "$VERSION" | sed 's/^v//')
          VERSION_LONG="${TSNET_VERSION}-${VERSION_CLEAN}"
          VERSION_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          {
            echo "tsnet_version=$TSNET_VERSION"
            echo "version_long=$VERSION_LONG"
            echo "version_short=$VERSION_SHORT"
          } >> "$GITHUB_OUTPUT"

          echo "Tailscale Version: $TSNET_VERSION"
          echo "Version Long: $VERSION_LONG"
          echo "Version Short: $VERSION_SHORT"

  go-release:
    name: Go Binaries
    needs: setup
    uses: sbaerlocher/.github/.github/workflows/release-go.yml@2026-07-18
    with:
      # renovate: datasource=golang-version depName=golang
      go-version: "1.26"
      goreleaser-args: "release --clean"
      extra-env: |
        VERSION_LONG=${{ needs.setup.outputs.version-long }}
        VERSION_SHORT=${{ needs.setup.outputs.version-short }}
      concurrency-suffix: go

  docker-release:
    name: Docker Multi-Platform
    needs: [setup, go-release]
    uses: sbaerlocher/.github/.github/workflows/release-docker.yml@2026-07-18
    with:
      image-name: "sbaerlocher/tsmetrics"
      dockerfile: "Dockerfile"
      platforms: "linux/amd64,linux/arm64"
      registry: "ghcr.io"
      push: true
      build-args: |
        VERSION=${{ needs.setup.outputs.version }}
        BUILD_TIME=${{ github.event.head_commit.timestamp }}
        VERSION_LONG=${{ needs.setup.outputs.version-long }}
        VERSION_SHORT=${{ needs.setup.outputs.version-short }}
      docker-metadata-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest,enable={{is_default_branch}}
      concurrency-suffix: docker

  helm-release:
    name: Helm Chart
    needs: [setup, docker-release]
    uses: sbaerlocher/.github/.github/workflows/release-helm.yml@2026-07-18
    with:
      chart-path: "deploy/helm"
      chart-name: "tsmetrics"
      registry: "ghcr.io"
      registry-path: "${{ github.repository_owner }}/chart"
      version: "${{ needs.setup.outputs.version }}"
      image-digest: "${{ needs.docker-release.outputs.image-digest }}"
      concurrency-suffix: helm
    secrets:
      registry-token: "${{ secrets.GITHUB_TOKEN }}"
