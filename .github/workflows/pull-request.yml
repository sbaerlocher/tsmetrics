---
name: Pull Request
run-name: |
  Pull Request by @${{ github.actor }}

'on':
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_call:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: read
  actions: read
  id-token: write

jobs:
  go-ci:
    name: Go CI Pipeline
    uses: sbaerlocher/.github/.github/workflows/ci-go.yml@2026-06-26
    with:
      # renovate: datasource=golang-version depName=golang
      go-version: "1.26"
      enable-integration-tests: true
      enable-codecov: true
      enable-codeql: true
      enable-dependency-review: true
      enable-security-scans: true
      enable-sarif-upload: true
      binary-path: "./cmd/tsmetrics"
      concurrency-suffix: go
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  helm-test:
    name: Helm Chart Test
    uses: sbaerlocher/.github/.github/workflows/ci-gitops.yml@2026-06-26
    with:
      fleet-paths: "deploy"
      enable-yaml-lint: false
      enable-fleet-validation: false
      enable-gitrepo-validation: false
      enable-helm-lint: true
      # enable-k8s-validation stays false: it runs kubeconform over the raw
      # files under fleet-paths, which for this repo are Helm templates ({{ }})
      # — kubeconform can't parse those. The "Validate Rendered Helm Output"
      # check already renders the chart and validates the result.
      enable-k8s-validation: false
      enable-docs-check: false
      concurrency-suffix: gitops

  secret-scan:
    name: Secret Detection Scan
    uses: sbaerlocher/.github/.github/workflows/security-secrets.yml@2026-06-26
    with:
      enable-gitleaks: true
      enable-trufflehog: true
      enable-pattern-detection: true
      concurrency-suffix: 'pr-secret-scan'

  code-review:
    name: Claude Code Review
    uses: sbaerlocher/.github/.github/workflows/ai-claude-review.yml@2026-06-26
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [go-ci, helm-test]
    if: always()
    steps:
      - name: Check results
        env:
          GO_CI_RESULT: ${{ needs.go-ci.result }}
          HELM_TEST_RESULT: ${{ needs.helm-test.result }}
        run: |
          if [[ "$GO_CI_RESULT" != "success" ]]; then
            echo "Go CI failed"
            exit 1
          fi
          if [[ "$HELM_TEST_RESULT" != "success" ]]; then
            echo "Helm test failed"
            exit 1
          fi
          echo "All checks passed"
