---
name: Nightly Security Scan
run-name: |
  Security Scan by @${{ github.actor }}

'on':
  schedule:
    # Weekly on Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

jobs:
  code-analysis:
    name: SAST (CodeQL)
    uses: sbaerlocher/.github/.github/workflows/security-code.yml@2026-07-18
    with:
      languages: '["go"]'
      go-version: "1.26"
      concurrency-suffix: code

  dependency-scan:
    name: Dependencies & Licenses
    uses: sbaerlocher/.github/.github/workflows/security-deps.yml@2026-07-18
    with:
      language: "go"
      enable-license-check: true
      concurrency-suffix: deps

  secret-detection:
    name: Secret Detection
    uses: sbaerlocher/.github/.github/workflows/security-secrets.yml@2026-07-18
    with:
      concurrency-suffix: secrets

  container-scan:
    name: Container Security
    uses: sbaerlocher/.github/.github/workflows/security-containers.yml@2026-07-18
    with:
      image-ref: "ghcr.io/${{ github.repository }}:latest"
      concurrency-suffix: containers
