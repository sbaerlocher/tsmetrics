---
name: Continuous Integration

"on":
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  go-ci:
    name: Go CI Pipeline
    uses: sbaerlocher/.github/.github/workflows/ci-go.yml@2026-03-20
    with:
      # renovate: datasource=golang-version depName=golang
      go-version: "1.26"
      enable-integration-tests: true
      enable-codecov: true
      enable-codeql: true
      enable-dependency-review: true
      enable-security-scans: true
      enable-sarif-upload: true
      binary-path: "./cmd/tsmetrics"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  helm-test:
    name: Helm Chart Test
    uses: sbaerlocher/.github/.github/workflows/helm-test.yml@2026-03-20
    with:
      chart-path: "deploy/helm"
      enable-kind-tests: true
