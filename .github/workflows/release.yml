name: Release Pipeline

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAME: tsmetrics

jobs:
  # ==============================================================================
  # SETUP FOR RELEASE
  # ==============================================================================
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          # Check if this is a prerelease (contains alpha, beta, rc)
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
            echo "This is a prerelease"
          else
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
            echo "This is a stable release"
          fi

  # ==============================================================================
  # BUILD RELEASE ARTIFACTS
  # ==============================================================================
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      artifacts-uploaded: ${{ steps.set-upload-status.outputs.uploaded }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Upload release artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/
            !dist/**/*.json
          retention-days: 30

      - name: Set upload status
        id: set-upload-status
        run: echo "uploaded=true" >> "$GITHUB_OUTPUT"

  # ==============================================================================
  # DOCKER RELEASE
  # ==============================================================================
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [setup, build-release]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for release
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.setup.outputs.is-prerelease == 'false' }}

      - name: Build and push multi-platform release image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.setup.outputs.version }}
            BUILD_TIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================================
  # HELM RELEASE
  # ==============================================================================
  helm-release:
    name: Helm Release
    runs-on: ubuntu-latest
    needs: [setup, build-release]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Update Chart version and appVersion
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present

          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/tsmetrics/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/tsmetrics/Chart.yaml

          echo "Updated Chart.yaml:"
          grep -E "(version|appVersion):" deploy/helm/tsmetrics/Chart.yaml

      - name: Package and publish Helm chart
        run: |
          # Package chart
          helm package deploy/helm/tsmetrics --destination .

          # Login to registry
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin

          # Push chart
          VERSION="${{ needs.setup.outputs.version }}"
          VERSION="${VERSION#v}"
          helm push "${{ env.CHART_NAME }}-$VERSION.tgz" "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

          echo "✅ Helm chart published successfully"

  # ==============================================================================
  # GITHUB RELEASE
  # ==============================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, build-release, docker-release, helm-release]
    if: always() && needs.build-release.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create release with GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  # ==============================================================================
  # RELEASE SUMMARY
  # ==============================================================================
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [setup, build-release, docker-release, helm-release, github-release]
    if: always()

    steps:
      - name: Release Summary
        run: |
          {
            echo "## 🚀 Release Pipeline Summary"
            echo ""
            echo "- **Version:** ${{ needs.setup.outputs.version }}"
            echo "- **Prerelease:** ${{ needs.setup.outputs.is-prerelease }}"
            echo ""
            echo "### 📦 Release Components"
            echo "- **Build:** ${{ needs.build-release.result }}"
            echo "- **Docker Release:** ${{ needs.docker-release.result }}"
            echo "- **Helm Release:** ${{ needs.helm-release.result }}"
            echo "- **GitHub Release:** ${{ needs.github-release.result }}"
            echo ""
            if [[ "${{ needs.docker-release.result }}" == "success" ]]; then
              echo "### 🐳 Container Images"
              echo "- **Registry:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}"
              echo "- **Latest:** Available for stable releases only"
            fi
            echo ""
            if [[ "${{ needs.helm-release.result }}" == "success" ]]; then
              echo "### ⎈ Helm Chart"
              echo "- **Registry:** oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }}"
              echo "- **Version:** ${{ needs.setup.outputs.version }}"
            fi
            echo ""
            if [[ "${{ needs.github-release.result }}" == "success" ]]; then
              echo "### 📋 Release Notes"
              echo "- **GitHub Release:** https://github.com/${{ github.repository }}/releases/tag/${{ needs.setup.outputs.version }}"
              echo "- **Binaries:** Available for Linux, macOS, Windows (AMD64 & ARM64)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
