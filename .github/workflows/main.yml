name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAME: tsmetrics

jobs:
  # ==============================================================================
  # TEST & LINT PHASE
  # ==============================================================================
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    outputs:
      go-cache-key: ${{ steps.cache.outputs.cache-hit }}
      helm-changed: ${{ steps.changes.outputs.helm }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            helm:
              - 'deploy/helm/**'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.3.0
        with:
          version: "2023.1.6"

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            go test -v -tags=integration ./tests/integration/...
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests

      - name: Build binary
        run: |
          go build -o bin/tsmetrics ./cmd/tsmetrics
          ./bin/tsmetrics --help || true

  # ==============================================================================
  # SECURITY SCAN PHASE (Matrix Strategy)
  # ==============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: always() && (needs.test-and-lint.result == 'success')
    strategy:
      matrix:
        scanner: [gosec, nancy, trivy-fs]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.scanner == 'gosec' || matrix.scanner == 'nancy'
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec Security Scanner
        if: matrix.scanner == 'gosec'
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out gosec.sarif ./..."

      - name: Run Nancy vulnerability scanner
        if: matrix.scanner == 'nancy'
        run: |
          go install github.com/sonatypecommunity/nancy@latest
          go list -json -deps ./... | nancy sleuth

      - name: Run Trivy filesystem scanner
        if: matrix.scanner == 'trivy-fs'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"

      - name: Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: |
            gosec.sarif
            trivy-fs.sarif
        continue-on-error: true

  # ==============================================================================
  # CODEQL ANALYSIS
  # ==============================================================================
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ==============================================================================
  # DEPENDENCY REVIEW (PR only)
  # ==============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate

  # ==============================================================================
  # DOCKER BUILD & TEST
  # ==============================================================================
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: always() && (needs.test-and-lint.result == 'success')
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.build.outputs.metadata }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix={{branch}}-

      - name: Build and export Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/image.tar
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Load and test Docker image
        run: |
          docker load --input /tmp/image.tar
          docker run --rm $(echo '${{ steps.meta.outputs.tags }}' | head -n1) --help || true

      - name: Container structure test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

          cat > container-structure-test.yaml << EOF
          schemaVersion: 2.0.0
          metadataTest:
            exposedPorts: ["9100"]
            workdir: "/app"
          commandTests:
            - name: "help command"
              command: "./tsmetrics"
              args: ["--help"]
              expectedOutput: ["Usage"]
          fileExistenceTests:
            - name: "Binary exists"
              path: "/app/tsmetrics"
              shouldExist: true
              permissions: "-rwxr-xr-x"
          EOF

          container-structure-test test --image $(echo '${{ steps.meta.outputs.tags }}' | head -n1) --config container-structure-test.yaml

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          format: "sarif"
          output: "trivy-image.sarif"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-image.sarif"
        continue-on-error: true

  # ==============================================================================
  # HELM CHART TESTS
  # ==============================================================================
  helm-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: always() && (needs.test-and-lint.result == 'success') && (needs.test-and-lint.outputs.helm-changed == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.13.0"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: helm-test
          kubectl_version: v1.28.0

      - name: Lint Helm Chart
        run: helm lint deploy/helm/tsmetrics

      - name: Test Chart Templates
        run: |
          cat > test-values.yaml << EOF
          tailscale:
            oauthClientId: "test-id"
            oauthClientSecret: "test-secret"
            tailnetName: "test.ts.net"
          image:
            tag: "test"
          persistence:
            enabled: false
          EOF

          helm template test-release deploy/helm/tsmetrics -f test-values.yaml > /dev/null
          echo "✅ Template rendering successful"

      - name: Install and test chart
        run: |
          helm install test-release deploy/helm/tsmetrics -f test-values.yaml --wait --timeout 300s
          kubectl get pods -l app.kubernetes.io/name=tsmetrics
          helm test test-release || true
          helm uninstall test-release

  # ==============================================================================
  # RELEASE JOBS (Tag only)
  # ==============================================================================
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [test-and-lint, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build release binaries
        run: |
          mkdir -p release
          platforms=("linux/amd64" "linux/arm64" "windows/amd64" "darwin/amd64" "darwin/arm64")

          for platform in "${platforms[@]}"; do
            platform_split=(${platform//\// })
            GOOS=${platform_split[0]}
            GOARCH=${platform_split[1]}
            output_name="tsmetrics-${GOOS}-${GOARCH}"
            if [ $GOOS = "windows" ]; then
              output_name+='.exe'
            fi

            echo "Building for $GOOS/$GOARCH..."
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o release/$output_name ./cmd/tsmetrics
          done

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: release/

  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [test-and-lint, docker-build, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image
          path: /tmp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.build-release.outputs.version }}
            BUILD_TIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-release:
    name: Helm Chart Release
    runs-on: ubuntu-latest
    needs: [test-and-lint, build-release]
    if: startsWith(github.ref, 'refs/tags/v') && (needs.test-and-lint.outputs.helm-changed == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.13.0"

      - name: Update Chart version
        run: |
          VERSION=${{ needs.build-release.outputs.version }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/tsmetrics/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/tsmetrics/Chart.yaml

      - name: Package and push Helm Chart
        run: |
          helm package deploy/helm/tsmetrics --destination .
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
          VERSION=${{ needs.build-release.outputs.version }}
          VERSION=${VERSION#v}
          helm push ${{ env.CHART_NAME }}-$VERSION.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, docker-release, helm-release]
    if: startsWith(github.ref, 'refs/tags/v') && always()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-artifacts
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            ## 🚀 TSMetrics ${{ needs.build-release.outputs.version }}

            ### 📦 Installation Options

            **Binary:**
            ```bash
            # Linux AMD64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.build-release.outputs.version }}/tsmetrics-linux-amd64 -o tsmetrics
            chmod +x tsmetrics
            ```

            **Docker:**
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-release.outputs.version }}
            ```

            **Helm Chart:**
            ```bash
            helm install tsmetrics oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }} --version ${{ needs.build-release.outputs.version }}
            ```

            **Kustomize:**
            ```bash
            kubectl apply -k https://github.com/${{ github.repository }}/deploy/kustomize/overlays/production?ref=${{ needs.build-release.outputs.version }}
            ```

            ### 🔐 Verification
            ```bash
            sha256sum -c checksums.txt
            ```

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
