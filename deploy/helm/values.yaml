# Default values for tsmetrics.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
---
replicaCount: 1

image:
  repository: ghcr.io/sbaerlocher/tsmetrics
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Tailscale configuration
tailscale:
  # OAuth2 credentials (required)
  oauthClientId: ""
  oauthClientSecret: ""
  tailnetName: ""

  # tsnet configuration
  tsnet:
    enabled: true
    hostname: "tsmetrics"
    tags: "exporter"
    stateDir: "/var/lib/tsmetrics/state"
    # authKey: ""  # Optional: for automatic registration

# Application configuration
config:
  port: 9100
  logLevel: "info"
  logFormat: "text"
  scrapeTag: "exporter"

  # Performance settings
  clientMetricsTimeout: "10s"
  maxConcurrentScrapes: 10
  scrapeInterval: "30s"
  clientMetricsPort: 5252

  # Target devices configuration
  # Comma-separated list of device names or IPs to target
  # Leave empty to scrape all devices
  targetDevices: ""

# Service configuration
service:
  type: ClusterIP
  port: 9100
  targetPort: 9100
  annotations: {}

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: false
  interval: 60s
  path: /metrics
  scrapeTimeout: 30s
  labels: {}
  annotations: {}

# External secret management
externalSecret:
  # If enabled, the chart will not create a Secret
  # You need to create a secret named "tsmetrics-secrets" manually
  enabled: false
  # Name of existing secret (default: tsmetrics-secrets)
  secretName: "tsmetrics-secrets"
  # Keys for the secret
  keys:
    oauthClientId: "OAUTH_CLIENT_ID"
    oauthClientSecret: "OAUTH_CLIENT_SECRET"
    tailnetName: "TAILNET_NAME"
    authKey: "TS_AUTHKEY" # optional

# Pod configuration
podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Resource limits
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Storage configuration for tsnet state
# Available storage types:
# - k8s-secret: Kubernetes Secret via tailscale kube: store (default, recommended)
# - pvc: PersistentVolumeClaim (CSI/traditional storage)
# - emptyDir: Temporary storage, persists for pod lifetime
# - hostPath: Direct host filesystem mount (node-local)
# - memory: In-memory tmpfs storage (fastest, non-persistent)
storage:
  # Storage type: k8s-secret, pvc, emptyDir, hostPath, memory
  type: "k8s-secret"

  # Kubernetes Secret configuration (when type=k8s-secret)
  kubeSecret:
    # Name of the Secret to use; defaults to <fullname>-state
    name: ""
    # Create the Secret if it does not exist
    create: true
    annotations: {}

  # PVC configuration (when type=pvc)
  pvc:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}

  # EmptyDir configuration (when type=emptyDir)
  emptyDir:
    sizeLimit: "1Gi"
    # medium: "" for disk, "Memory" for tmpfs
    medium: ""

  # HostPath configuration (when type=hostPath)
  hostPath:
    path: "/var/lib/tsmetrics"
    type: "DirectoryOrCreate"

  # Memory configuration (when type=memory)
  memory:
    sizeLimit: "512Mi"

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Security and permissions
security:
  # Use initContainer for permission setup (requires privileged access)
  # Only enable if fsGroup is insufficient for your storage type
  useInitContainer: false

  # Alternative: Set securityContext allowPrivilegeEscalation for init
  initContainerPrivileged: false

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Node selection
nodeSelector: {}

tolerations: []

affinity: {}

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Network Policy Configuration
networkPolicy:
  enabled: true

  # Policy types to enforce
  policyTypes:
    - Ingress
    - Egress

  # Ingress rules
  ingress:
    # Allow monitoring systems
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - namespaceSelector:
            matchLabels:
              name: ingress
      ports:
        - protocol: TCP
          port: 9100
    # Allow health checks from any source
    - from: []
      ports:
        - protocol: TCP
          port: 9100

  # Egress rules
  #
  # Kubernetes NetworkPolicy cannot match by DNS name, so API traffic has to
  # be allowed by destination CIDR. The defaults below are intentionally
  # broad — they permit *any* external HTTPS/HTTP destination — because the
  # exporter has to reach api.tailscale.com (and in tsnet mode every device
  # in the tailnet). For stricter setups, override `egress` in values.yaml
  # with your Tailscale IP range (e.g. 100.64.0.0/10) plus the Tailscale
  # control-plane CIDRs, and keep port 80 off unless a transparent proxy
  # truly needs it.
  egress:
    # Tailscale API (HTTPS) + HTTP redirects from upstream captive portals.
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Tailscale device metrics endpoints (port 5252) inside the tailnet.
    # Safe to restrict further with `to.ipBlock.cidr: 100.64.0.0/10` if you
    # only scrape devices that live in the standard Tailscale CGNAT range.
    - to: []
      ports:
        - protocol: TCP
          port: 5252
    # DNS resolution (UDP primary, TCP fallback for large responses).
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

  # Additional labels for NetworkPolicy
  labels: {}

  # Additional annotations for NetworkPolicy
  annotations: {}
