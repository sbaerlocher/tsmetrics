{{- if eq .Values.storage.type "k8s-secret" }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tsmetrics.serviceAccountName" . }}
  labels:
    {{- include "tsmetrics.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tsmetrics.fullname" . }}-state
  labels:
    {{- include "tsmetrics.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ default (printf "%s-state" (include "tsmetrics.fullname" .)) .Values.storage.kubeSecret.name | quote }}]
    verbs: ["get", "update", "patch"]
  # create cannot be scoped by resourceNames (K8s limitation: resource doesn't exist yet)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tsmetrics.fullname" . }}-state
  labels:
    {{- include "tsmetrics.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tsmetrics.fullname" . }}-state
subjects:
  - kind: ServiceAccount
    name: {{ include "tsmetrics.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
