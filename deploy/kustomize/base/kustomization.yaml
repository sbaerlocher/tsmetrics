---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: tsmetrics-base

namespace: tsmetrics

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - networkpolicy.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml

images:
  - name: ghcr.io/sbaerlocher/tsmetrics
    newTag: v1.1.3

labels:
  - pairs:
      app.kubernetes.io/name: tsmetrics
      app.kubernetes.io/component: exporter
      app.kubernetes.io/part-of: monitoring
