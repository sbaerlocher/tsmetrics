apiVersion: v1
kind: ConfigMap
metadata:
  name: tsmetrics-config
data:
  # Application settings
  PORT: "9100"
  ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # tsnet configuration
  USE_TSNET: "true"
  TSNET_HOSTNAME: "tsmetrics"
  TSNET_TAGS: "exporter"
  TSNET_STATE_DIR: "/tmp/tsnet-state"
  REQUIRE_EXPORTER_TAG: "false"

  # Performance settings
  CLIENT_METRICS_TIMEOUT: "10s"
  MAX_CONCURRENT_SCRAPES: "10"
  SCRAPE_INTERVAL: "30s"
  CLIENT_METRICS_PORT: "5252"
