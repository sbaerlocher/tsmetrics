---
version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - main: ./cmd/tsmetrics
    binary: tsmetrics
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X tailscale.com/version.longStamp={{.Env.VERSION_LONG}}
      - -X tailscale.com/version.shortStamp={{.Env.VERSION_SHORT}}
      - -extldflags "-static"
    flags:
      - -trimpath

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

# SBOM per archive (syft, SPDX JSON) — published as release assets.
sboms:
  - artifacts: archive

# Keyless cosign signatures (Sigstore OIDC via GitHub Actions). Signs the
# archives, checksums and SBOMs; .sig + .pem land next to each artifact.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    output: true
    artifacts: checksum
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - --yes

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: sbaerlocher
    name: tsmetrics
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## TSMetrics {{.Tag}}

    Tailscale Prometheus Exporter that combines API metadata with live device metrics for complete network observability.

    **Full details**: See [CHANGELOG.md](https://github.com/sbaerlocher/tsmetrics/blob/{{.Tag}}/CHANGELOG.md)

    ---

    ### Installation

    **Binary Downloads:**
    Choose the appropriate binary for your platform from the assets below.

    **Docker:**
    ```bash
    docker pull ghcr.io/sbaerlocher/tsmetrics:{{.Tag}}
    ```

    **Helm Chart:**
    ```bash
    helm install tsmetrics oci://ghcr.io/sbaerlocher/charts/tsmetrics --version {{.Tag}}
    ```

  footer: |
    ### Verification
    ```bash
    sha256sum -c checksums.txt
    ```
